<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Validator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    #email-input {
      flex: 1;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    #email-input:focus {
      border-color: #4299e1;
    }

    #validate-btn {
      padding: 0.65rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      background: #4299e1;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #validate-btn:hover {
      background: #3182ce;
    }

    #validate-btn:active {
      background: #2b6cb0;
    }

    #result {
      margin-top: 1.25rem;
      min-height: 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      border-radius: 6px;
      padding: 0;
      transition: all 0.2s;
    }

    #result.valid {
      color: #276749;
      background: #c6f6d5;
      padding: 0.6rem 1rem;
    }

    #result.invalid {
      color: #9b2c2c;
      background: #fed7d7;
      padding: 0.6rem 1rem;
    }

    @media (max-width: 400px) {
      .card {
        padding: 1.75rem 1.25rem;
      }

      .input-row {
        flex-direction: column;
      }

      #validate-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email Validator</h1>
    <div class="input-row">
      <input
        type="text"
        id="email-input"
        placeholder="Enter email address"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="validate-btn">Validate</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    (function () {
      var emailInput = document.getElementById('email-input');
      var validateBtn = document.getElementById('validate-btn');
      var result = document.getElementById('result');

      // Focus the input on page load
      emailInput.focus();

      function isValidEmail(email) {
        // No spaces allowed
        if (email.indexOf(' ') !== -1) return false;

        // Exactly one '@' symbol
        var atParts = email.split('@');
        if (atParts.length !== 2) return false;

        var localPart = atParts[0];
        var domain = atParts[1];

        // Non-empty local part
        if (localPart.length === 0) return false;

        // Domain must contain at least one '.'
        var dotIndex = domain.lastIndexOf('.');
        if (dotIndex === -1) return false;

        // Non-empty TLD (part after the last '.')
        var tld = domain.substring(dotIndex + 1);
        if (tld.length === 0) return false;

        // Non-empty domain part before the last '.'
        // (covers case like "@.com" — domain part before dot is empty)
        var domainBeforeTld = domain.substring(0, dotIndex);
        if (domainBeforeTld.length === 0) return false;

        return true;
      }

      function showResult(valid) {
        result.textContent = valid ? '\u2713 Valid email address' : '\u2717 Invalid email address';
        result.className = valid ? 'valid' : 'invalid';
      }

      function clearResult() {
        result.textContent = '';
        result.className = '';
      }

      validateBtn.addEventListener('click', function () {
        showResult(isValidEmail(emailInput.value));
      });

      emailInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          showResult(isValidEmail(emailInput.value));
        }
      });

      emailInput.addEventListener('input', function () {
        clearResult();
      });
    })();
  </script>
</body>
</html>
